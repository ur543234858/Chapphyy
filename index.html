<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Links</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f8f9fa; /* Warna background abu-abu muda */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .profile-container {
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
            padding: 20px;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-custom {
            margin-bottom: 15px;
            padding: 12px;
            font-weight: 500;
            transition: transform 0.2s;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .btn-custom:hover {
            transform: scale(1.02);
        }
        .btn-instagram { background-color: #E1306C; color: white; }
        .btn-tiktok { background-color: #000000; color: white; }
        .btn-discord { background-color: #5865F2; color: white; }
        .btn-website { background-color: #6c757d; color: white; }
        
        i { margin-right: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-container">
            <img src="profile.jpg" alt="Profile" class="profile-img">
            
            <h2 class="fw-bold">Chapphyy</h2>
            <p class="text-muted">Hola</p>
            <hr>

            <a href="https://discord.gg/jHekkZU6" class="btn btn-custom btn-discord" target="_blank">
                <i class="fab fa-discord"></i> Discord
            </a>

            <a href="https://tiktok.com/@ur.469983" class="btn btn-custom btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>

            <a href="#" class="btn btn-custom btn-secondary" onclick="alert('Maaf, link ini belum tersedia!')">
                <i class="fas fa-hourglass-start"></i> Segera Hadir
            </a>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
